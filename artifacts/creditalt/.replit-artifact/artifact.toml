kind = "web"
previewPath = "/"
title = "CreditAlt"
version = "1.0.0"
id = "artifacts/creditalt"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18864

[services.development]
run = "pnpm --filter @workspace/creditalt run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/creditalt", "run", "build" ]
publicDir = "artifacts/creditalt/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18864"
BASE_PATH = "/"
